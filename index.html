<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Gem Scanner - Low Cap Explorer</title>
    <meta name="description" content="Scanner de criptomonedas de baja capitalización con alto potencial. Filtrado por Market Cap, FDV y crecimiento 24h.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --primary: #10b981;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 2rem;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
        }

        .btn-scan {
            background: linear-gradient(135deg, var(--primary), #059669);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.8rem 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .btn-scan:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Status & Progress */
        .status-bar {
            margin-bottom: 1.5rem;
            display: none;
        }

        .progress-container {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            transition: width 0.3s;
        }

        /* Results Table */
        .results-container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            overflow-x: auto; /* Permite scroll horizontal si es necesario */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 1200px; /* Ajustado para nueva columna */
        }

        th {
            padding: 0.75rem 0.5rem; /* Padding reducido aún más */
            background: rgba(255, 255, 255, 0.03);
            font-size: 0.7rem; /* Fuente ligeramente más pequeña */
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        /* Filter Header Row */
        .filter-header-row th {
            background: rgba(15, 23, 42, 0.4);
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .filter-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .filter-input-wrapper label {
            font-size: 0.6rem;
            color: var(--text-dim);
            font-weight: 600;
            white-space: nowrap;
        }

        .filter-input-wrapper input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.4rem 0.5rem;
            color: white;
            font-family: inherit;
            font-size: 0.8rem;
            width: 100%;
            min-width: 90px; /* Asegura visibilidad total del número */
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-input-wrapper input#minChange {
            min-width: 60px;
        }

        .filter-input-wrapper input:focus {
            border-color: var(--secondary);
        }

        td {
            padding: 0.75rem 0.5rem; /* Padding reducido */
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem; /* Fuente ligeramente más pequeña */
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .coin-name {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
        }

        .coin-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1e293b;
        }

        .symbol {
            color: var(--text-dim);
            font-weight: 400;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .gain {
            color: var(--primary);
            font-weight: 600;
        }

        .loss {
            color: #ef4444;
        }

        .source-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 9999px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Spinner */
        .spinner {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 2rem; }
            th:nth-child(2), td:nth-child(2) { display: none; }
            .filter-header-row th:nth-child(2) { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Gems Hunter</h1>
        <p class="subtitle">Buscador avanzado de micro-caps en DefiLlama</p>
    </header>

    <div class="container">
        <div class="top-bar">
            <div id="resultCount" style="font-weight: 600; color: var(--primary); font-size: 1.1rem;">0 encontrados</div>
            <button class="btn-scan" id="scanBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Escanear Mercado
            </button>
        </div>

        <div class="status-bar" id="statusBar">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="statusText" style="font-size: 0.9rem; color: var(--text-dim);">Iniciando búsqueda...</span>
            </div>
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div class="results-container">
            <table id="resultsTable">
                <thead>
                    <tr class="filter-header-row">
                        <th></th> <!-- Categoría -->
                        <th></th> <!-- Estado -->
                        <th></th> <!-- Precio -->
                        <th>
                            <div class="filter-input-wrapper">
                                <label>Mín Cambio %</label>
                                <input type="number" id="minChange" value="5" placeholder="Ej: 5">
                            </div>
                        </th>
                        <th>
                            <div class="filter-input-wrapper">
                                <label>MC Máx ($)</label>
                                <input type="text" id="maxMarketCap" value="10.000.000" placeholder="Ej: 10.000.000">
                            </div>
                        </th>
                        <th>
                            <div class="filter-input-wrapper">
                                <label>FDV Máx ($)</label>
                                <input type="text" id="maxFDV" value="20.000.000" placeholder="Ej: 20.000.000">
                            </div>
                        </th>
                        <th>
                            <div class="filter-input-wrapper">
                                <label>TVL Mín ($)</label>
                                <input type="text" id="minTVL" value="10.000" placeholder="Ej: 10.000">
                            </div>
                        </th>
                        <th></th> <!-- TVL/FDV -->
                        <th></th> <!-- Antigüedad -->
                        <th></th> <!-- Website -->
                        <th></th> <!-- X (Twitter) -->
                        <th></th> <!-- Info -->
                    </tr>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Cambio 24h</th>
                        <th>Market Cap</th>
                        <th>FDV</th>
                        <th>TVL</th>
                        <th>TVL / FDV</th>
                        <th>Edad (Años)</th>
                        <th>Website</th>
                        <th>X (Twitter)</th>
                        <th>Info</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="13" style="text-align: center; padding: 4rem; color: var(--text-dim);">
                            Presiona "Escanear Mercado" para comenzar con los filtros aplicados.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const resultsBody = document.getElementById('resultsBody');
        const statusBar = document.getElementById('statusBar');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('statusText');
        const resultCountText = document.getElementById('resultCount');

        // Helper para convertir "10.000.000" a número real
        function parseFormattedNumber(val) {
            if (!val) return 0;
            // Elimina todos los puntos y convierte a float
            return parseFloat(val.toString().replace(/\./g, '')) || 0;
        }

        async function fetchDefiLlama(maxMC, maxFDV, minChange, minTVL) {
            updateProgress(40, "Consultando Protocolos en DefiLlama...");
            try {
                const response = await fetch('https://api.llama.fi/protocols');
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    const filtered = data.filter(item => {
                        const mc = item.mcap || 0;
                        const change = item.change_1d || 0;
                        const tvl = item.tvl || 0;
                        return mc > 0 && mc <= maxMC && change >= minChange && tvl >= minTVL;
                    });

                    updateProgress(70, "Obteniendo precios actuales...");
                    
                    // Obtener precios en batch
                    const geckoIds = filtered.map(p => p.gecko_id).filter(id => id);
                    let pricesMap = {};
                    
                    if (geckoIds.length > 0) {
                        try {
                            const coinsQuery = geckoIds.map(id => `coingecko:${id}`).join(',');
                            const priceRes = await fetch(`https://coins.llama.fi/prices/current/${coinsQuery}`);
                            const priceData = await priceRes.json();
                            pricesMap = priceData.coins || {};
                        } catch (pe) {
                            console.error("Error obteniendo precios:", pe);
                        }
                    }

                    return filtered.map(p => {
                        const coinKey = `coingecko:${p.gecko_id}`;
                        const priceInfo = pricesMap[coinKey] || null;
                        
                        return {
                            name: item_name(p),
                            symbol: p.symbol,
                            slug: p.slug,
                            gecko_id: p.gecko_id,
                            cmcId: p.cmcId,
                            price: priceInfo ? priceInfo.price : 0,
                            change24h: p.change_1d || 0,
                            marketCap: p.mcap,
                            fdv: p.fdv || p.mcap * 1.5,
                            tvl: p.tvl || 0,
                            icon: p.logo || `https://icons.llamao.fi/icons/coins/unknown.png`,
                            category: p.category || 'DeFi',
                            subcategory: (p.tags && p.tags.length > 0) ? p.tags[0] : '',
                            website: p.url || '',
                            twitter: p.twitter || '',
                            listedAt: p.listedAt || 0,
                            source: 'DefiLlama'
                        };
                    });
                }
            } catch (e) {
                console.error("Error en DefiLlama:", e);
            }
            return [];
        }

        function item_name(p) {
            return p.name.replace(' CEX', '').replace(' Bridge', '');
        }

        function updateProgress(percent, text) {
            progressFill.style.width = `${percent}%`;
            statusText.innerText = text;
        }

        function formatCurrency(val) {
            if (!val || val === 0) return 'N/A';
            if (val >= 1000000000) return `$${(val / 1000000000).toFixed(2)}B`;
            if (val >= 1000000) return `$${(val / 1000000).toFixed(2)}M`;
            if (val >= 1000) return `$${(val / 1000).toFixed(2)}K`;
            return `$${val.toFixed(2)}`;
        }

        function displayResults(gems) {
            resultsBody.innerHTML = '';
            
            if (gems.length === 0) {
                resultsBody.innerHTML = '<tr><td colspan="13" style="text-align: center; padding: 4rem; color: var(--text-dim);">No se encontraron gemas con estos criterios. Prueba ajustando los filtros superiores.</td></tr>';
                resultCountText.innerText = '0 encontrados';
                return;
            }

            gems.sort((a, b) => b.marketCap - a.marketCap);
            resultCountText.innerText = `${gems.length} encontrados`;

            const currentTimestamp = Date.now() / 1000;

            gems.forEach((gem, index) => {
                const tr = document.createElement('tr');
                tr.className = 'fade-in';
                tr.style.animationDelay = `${index * 0.05}s`;
                
                const changeClass = gem.change24h >= 0 ? 'gain' : 'loss';
                const llamaUrl = `https://defillama.com/protocol/${gem.slug}`;
                const geckoUrl = gem.gecko_id ? `https://www.coingecko.com/en/coins/${gem.gecko_id}` : null;
                const cmcUrl = gem.cmcId ? `https://coinmarketcap.com/currencies/${gem.symbol.toLowerCase()}/` : null;
                
                const btnStyle = "text-decoration: none; display: flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; font-weight: 600; padding: 4px 8px; border-radius: 6px; width: fit-content; white-space: nowrap;";
                
                tr.innerHTML = `
                    <td>
                        <div class="coin-name">
                            <img src="${gem.icon}" class="coin-icon" onerror="this.src='https://via.placeholder.com/32?text=${gem.symbol.charAt(0)}'">
                            <div>
                                <div>${gem.name}</div>
                                <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 400;">${gem.symbol}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="font-weight: 600; color: var(--text-main);">
                            ${gem.price > 0 ? (gem.price < 0.01 ? gem.price.toFixed(6) : gem.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})) : 'N/A'}
                        </div>
                    </td>
                    <td>
                        <div style="font-weight: 600;">${gem.category}</div>
                        ${gem.subcategory ? `<div style="font-size: 0.7rem; color: var(--text-dim);">${gem.subcategory}</div>` : ''}
                    </td>
                    <td><span style="color: var(--primary); font-size: 0.8rem; font-weight: 600;">Activo</span></td>
                    <td class="${changeClass}">${gem.change24h > 0 ? '+' : ''}${gem.change24h.toFixed(2)}% <br><small style="font-size: 0.6rem; font-weight: 400; color: var(--text-dim);">TVL Growth</small></td>
                    <td>${formatCurrency(gem.marketCap)}</td>
                    <td>${formatCurrency(gem.fdv)} <br><small style="font-size: 0.6rem; font-weight: 400; color: var(--text-dim);">Est.</small></td>
                    <td>${formatCurrency(gem.tvl)}</td>
                    <td>
                        <div style="font-weight: 600;">${gem.fdv > 0 ? ((gem.tvl / gem.fdv) * 100).toFixed(0) : '0'}%</div>
                    </td>
                    <td>
                        <div style="font-weight: 600;">${gem.listedAt > 0 ? ((currentTimestamp - gem.listedAt) / (365.25 * 24 * 3600)).toFixed(1) : 'N/A'}</div>
                        <div style="font-size: 0.6rem; color: var(--text-dim);">Años</div>
                    </td>
                    <td>
                        ${gem.website ? `
                        <a href="${gem.website}" target="_blank" style="${btnStyle} color: var(--text-main); background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                            Sitio
                        </a>` : '<span style="color: var(--text-dim); font-size: 0.7rem;">-</span>'}
                    </td>
                    <td>
                        ${gem.twitter ? `
                        <a href="https://x.com/${gem.twitter}" target="_blank" style="${btnStyle} color: #1DA1F2; background: rgba(29, 161, 242, 0.1); border: 1px solid rgba(29, 161, 242, 0.2);">
                            @${gem.twitter}
                        </a>` : '<span style="color: var(--text-dim); font-size: 0.7rem;">-</span>'}
                    </td>
                    <td>
                        <div style="display: flex; gap: 0.4rem; flex-wrap: wrap;">
                            ${geckoUrl ? `
                            <a href="${geckoUrl}" target="_blank" title="CoinGecko" style="${btnStyle} padding: 4px; color: #8cc63f; background: rgba(140, 198, 63, 0.1); border: 1px solid rgba(140, 198, 63, 0.2);">
                                <img src="https://www.coingecko.com/favicon.ico" width="16" height="16" alt="CG">
                            </a>` : ''}
                            ${cmcUrl ? `
                            <a href="${cmcUrl}" target="_blank" title="CoinMarketCap" style="${btnStyle} padding: 4px; color: #3861fb; background: rgba(56, 97, 251, 0.1); border: 1px solid rgba(56, 97, 251, 0.2);">
                                <img src="https://coinmarketcap.com/favicon.ico" width="16" height="16" alt="CMC">
                            </a>` : ''}
                            <a href="${llamaUrl}" target="_blank" title="DefiLlama" style="${btnStyle} padding: 4px; color: var(--secondary); background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2);">
                                <img src="https://defillama.com/favicon.ico" width="16" height="16" alt="DL">
                            </a>
                        </div>
                    </td>
                `;
                resultsBody.appendChild(tr);
            });
        }

        scanBtn.addEventListener('click', async () => {
            const rawMC = document.getElementById('maxMarketCap').value;
            const rawFDV = document.getElementById('maxFDV').value;
            const rawTVL = document.getElementById('minTVL').value;
            
            const maxMC = parseFormattedNumber(rawMC);
            const maxFDV = parseFormattedNumber(rawFDV);
            const minTVL = parseFormattedNumber(rawTVL);
            const minChange = parseFloat(document.getElementById('minChange').value) || 0;

            scanBtn.disabled = true;
            statusBar.style.display = 'block';
            resultsBody.innerHTML = '<tr><td colspan="13" style="text-align: center; padding: 4rem;"><div class="spinner">Escaneando protocolos en DefiLlama...</div></td></tr>';

            const dlGems = await fetchDefiLlama(maxMC, maxFDV, minChange, minTVL);

            updateProgress(100, "Escaneo completado.");
            displayResults(dlGems);
            scanBtn.disabled = false;
        });

        // Formateo automático mientras escribe
        document.getElementById('maxMarketCap').addEventListener('blur', function(e) {
            const val = parseFormattedNumber(e.target.value);
            if (val > 0) e.target.value = val.toLocaleString('de-DE');
        });
        document.getElementById('maxFDV').addEventListener('blur', function(e) {
            const val = parseFormattedNumber(e.target.value);
            if (val > 0) e.target.value = val.toLocaleString('de-DE');
        });
        document.getElementById('minTVL').addEventListener('blur', function(e) {
            const val = parseFormattedNumber(e.target.value);
            if (val > 0) e.target.value = val.toLocaleString('de-DE');
        });
    </script>
</body>
</html>
